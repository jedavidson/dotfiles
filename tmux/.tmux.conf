# Set proper terminal settings for colour rendering, particularly in vim
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Enable mouse mode
set -g mouse on

# Rename window titles automatically
setw -g automatic-rename

# Reorder window index numbers when a window is deleted
set-option -g renumber-windows on

# Start window index numbers from 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

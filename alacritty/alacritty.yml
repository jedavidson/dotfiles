# Window settings
window:
  dynamic_title: true
  dimensions:
    columns: 83
    lines: 25

# Fonts font:
font:
  normal:
    family: DejaVuSansMono Nerd Font Mono
    style: Regular
  bold:
    family: DejaVuSansMono Nerd Font Mono
    style: Bold
  italic:
    family: DejaVuSansMono Nerd Font Mono
    style: Italic
  size: 9

# Colour schemes

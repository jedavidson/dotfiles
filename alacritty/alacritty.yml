# Window settings
window:
  dynamic_title: true
  dimensions:
    columns: 80
    lines: 24

# Fonts
font:
    normal:
      family: FiraCode Nerd Font Mono
      style: Regular
    bold:
      family: FiraCode Nerd Font Mono
      style: Bold
    italic:
      family: FiraCode Nerd Font Mono
      style: Italic

# Colour schemes
schemes:
  gruvbox: &gruvbox
    primary:
      background: '#1d2021'
      foreground: '#ebdbb2'
    normal:
      black:   '#282828'
      red:     '#cc241d'
      green:   '#98971a'
      yellow:  '#d79921'
      blue:    '#458588'

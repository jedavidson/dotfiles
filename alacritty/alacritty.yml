# Window settings
window:
  dimensions:
    columns: 80
    lines: 24

# Fonts
font:
  size: 14
  normal:
    family: Ubuntu Mono
    style: Regular
  bold:
    family: Ubuntu Mono
    style: Bold
  italic:
    family: Ubuntu Mono
    style: Italic


window:
  dimensions:
    columns: 83
    lines: 25
  padding:
    x: 2
    y: 2

font:
  normal:
    family: MesloLGS Nerd Font Mono
    style: Regular
  bold:
    family: MesloLGS Nerd Font Mono
    style: Bold
  italic:
    family: MesloLGS Nerd Font Mono
    style: Italic
  size: 12

schemes:
  tomorrow_dark_bright: &tomorrow
    primary:
      background: '#1d1f21'
      foreground: '#eaeaea'
    normal:
      black:   '#000000'
      red:     '#d54e53'
      green:   '#b9ca4a'
      yellow:  '#e6c547'
      blue:    '#7aa6da'
      magenta: '#c397d8'
      cyan:    '#70c0ba'
      white:   '#d1d1d1'
    bright:
      black:   '#666666'
      red:     '#ff3334'
      green:   '#9ec400'
      yellow:  '#e7c547'
      blue:    '#7aa6da'
      magenta: '#b77ee0'
      cyan:    '#54ced6'
      white:   '#bdbdbd'

colors: *tomorrow
